<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كبابجي - البوابة الرقمية الموحدة</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-main: #F4F7F6; --bg-card: #ffffff; --text-dark: #2C3E50; --muted: #7F8C8D;
    --radius: 12px; --shadow: 0 6px 20px rgba(0, 0, 0, 0.03); --border-color: #E5E9E8;
    --color-brand: #E64A19; --color-stock: #D35400; --color-accounts: #2C3E50; 
    --color-alerts: #BF360C; --color-calc: #2E7D32; --color-numbers: #F9A825; --color-github: #24292E;
  }

  [data-theme="dark"] {
    --bg-main: #121212; --bg-card: #1E1E1E; --text-dark: #F5F5F5; --muted: #A0A0A0; --border-color: #2C2C2C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; text-decoration: none !important; } /* إلغاء أي خطوط تحت الروابط نهائياً */

  body { font-family: 'Tajawal', sans-serif; background: var(--bg-main); color: var(--text-dark); min-height: 100vh; display: flex; flex-direction: column; transition: background 0.3s; }

  .theme-toggle-btn { position: absolute; top: 15px; left: 20px; background: var(--bg-card); border: 1px solid var(--border-color); padding: 5px 10px; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: 700; color: var(--text-dark); z-index: 210; }

  .side-bar { position: fixed; top: 150px; background: var(--bg-card); border: 1px solid var(--border-color); padding: 10px 8px; display: flex; flex-direction: column; gap: 7px; z-index: 200; width: 135px; border-radius: var(--radius); }
  .right-bar { right: 10px; }
  .left-bar { left: 10px; }

  .side-link-item { display: block; text-align: center; padding: 8px 4px; border-radius: 6px; font-size: 11.5px; font-weight: 700; transition: all 0.2s; color: var(--text-dark); background: var(--bg-main); }
  .side-link-item:hover { opacity: 0.8; }

  .main-content { flex: 1; width: 100%; max-width: 1100px; margin: 0 auto; padding: 20px 150px; }
  
  .hero-section { text-align: center; margin-bottom: 20px; }
  .cards-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }

  .portal-card { background: var(--bg-card); border-radius: var(--radius); padding: 15px; text-align: center; border: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; }
  .icon-wrapper { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 6px; background: var(--bg-main); }
  .portal-card h2 { font-size: 14px; margin-bottom: 4px; }
  .portal-card p { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .action-btn { color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; }

  .add-shortcut-btn { background: none; border: 1px dashed var(--muted); color: var(--muted); border-radius: 6px; padding: 4px; font-size: 10px; cursor: pointer; margin-top: 5px; }

  .tasks-section { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 15px; margin-bottom: 20px; }
  .task-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg-main); padding: 6px 10px; border-radius: 6px; margin-bottom: 5px; font-size: 12.5px; }
</style>
</head>
<body>

<button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="side-bar right-bar">
    <div style="font-size:10px; text-align:center; margin-bottom:5px;">أدوات جوجل والذكاء</div>
    <a href="https://www.google.com" class="side-link-item">بحث جوجل</a>
    <a href="https://chatgpt.com/" class="side-link-item">ChatGPT</a>
    <div id="rightCustomLinks"></div>
    <button class="add-shortcut-btn" onclick="addCustomLink('right')">➕ إضافة</button>
</div>

<div class="side-bar left-bar">
    <div style="font-size:10px; text-align:center; margin-bottom:5px;">المنصات الحكومية</div>
    <a href="https://qiwa.sa" class="side-link-item">منصة قوى</a>
    <a href="https://www.absher.sa" class="side-link-item">منصة أبشر</a>
    <div id="leftCustomLinks"></div>
    <button class="add-shortcut-btn" onclick="addCustomLink('left')">➕ إضافة</button>
</div>

<div class="main-content">
    <div class="hero-section">
        <h1 style="color:var(--color-brand)">كبابجي</h1>
        <p>البوابة الرقمية الموحدة</p>
    </div>

    <div class="cards-container">
        <a href="http://kababjk.opos.me/" class="portal-card"><div class="icon-wrapper">📦</div><h2>المخزون</h2><div class="action-btn" style="background:var(--color-stock)">دخول</div></a>
        <a href="http://kababjk-accounts.opos.me/Account/LogOn?LanguageID=2" class="portal-card"><div class="icon-wrapper">💼</div><h2>الحسابات</h2><div class="action-btn" style="background:var(--color-accounts)">دخول</div></a>
        <a href="https://abo-shefaa.vercel.app/" class="portal-card"><div class="icon-wrapper">🔔</div><h2>التنبيهات</h2><div class="action-btn" style="background:var(--color-alerts)">دخول</div></a>
        <a href="https://kababji-seven.vercel.app/" class="portal-card"><div class="icon-wrapper">📊</div><h2>الحاسبة</h2><div class="action-btn" style="background:var(--color-calc)">دخول</div></a>
        <a href="https://kababji-xl.vercel.app/" class="portal-card"><div class="icon-wrapper">🧩</div><h2>تنظيم</h2><div class="action-btn" style="background:var(--color-numbers)">دخول</div></a>
        <a href="https://github.com/kababji2016-hub" class="portal-card"><div class="icon-wrapper">⚙️</div><h2>الأكواد</h2><div class="action-btn" style="background:var(--color-github)">دخول</div></a>
    </div>

    <div class="tasks-section">
        <h3>📋 قائمة المهام</h3>
        <div id="tasksList"></div>
    </div>
</div>

<script>
function addCustomLink(side) {
    const title = prompt("اسم الرابط:");
    const url = prompt("الرابط:");
    if(title && url) {
        const links = JSON.parse(localStorage.getItem('customLinks') || '{}');
        if(!links[side]) links[side] = [];
        links[side].push({title, url, id: Date.now()});
        localStorage.setItem('customLinks', JSON.stringify(links));
        renderLinks();
    }
}

function renderLinks() {
    const links = JSON.parse(localStorage.getItem('customLinks') || '{}');
    ['right', 'left'].forEach(side => {
        const container = document.getElementById(side + 'CustomLinks');
        container.innerHTML = (links[side] || []).map(l => `<a href="${l.url}" class="side-link-item">${l.title}</a>`).join('');
    });
}

function toggleTheme() {
    document.documentElement.toggleAttribute('data-theme');
    localStorage.setItem('theme', document.documentElement.hasAttribute('data-theme') ? 'dark' : 'light');
}

window.onload = () => {
    if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    renderLinks();
};
</script>
</body>
</html>
