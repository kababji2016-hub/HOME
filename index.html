<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كبابجي - البوابة الرقمية الموحدة</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-main: #F4F7F6; 
    --bg-card: #ffffff;
    --text-dark: #2C3E50; 
    --muted: #7F8C8D;
    --radius: 14px;
    --shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
    --border-color: #E5E9E8;
    
    --color-brand: #E64A19;     
    --color-stock: #D35400;     
    --color-accounts: #2C3E50;  
    --color-alerts: #BF360C;    
    --color-calc: #2E7D32;      
    --color-numbers: #F9A825;
    --color-github: #24292E; 
    
    --color-gpt: #10a37f;
    --color-gemini: #1a73e8;
    --color-claude: #d97706;
  }

  /* ألوان الوضع الليلي الذكي */
  [data-theme="dark"] {
    --bg-main: #1A1A1A;
    --bg-card: #262626;
    --text-dark: #F5F5F5;
    --muted: #9AA0A6;
    --border-color: #333333;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg-main);
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    direction: rtl;
    position: relative;
    transition: background 0.3s, color 0.3s;
  }

  /* زر تحويل الوضع الليلي علوياً */
  .theme-toggle-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-dark);
    box-shadow: var(--shadow);
    z-index: 210;
  }

  /* الشرائط الجانبية بالأسماء النصية الصغيرة ممتدة تلقائياً لتناسب عدد العناصر */
  .side-bar {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: var(--bg-card);
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    border: 1px solid var(--border-color);
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 200;
    width: 140px; 
    transition: background 0.3s, border-color 0.3s;
  }
  
  .side-bar.right-bar { right: 0; border-radius: var(--radius) 0 0 var(--radius); }
  .side-bar.left-bar { left: 0; border-radius: 0 var(--radius) var(--radius) 0; }

  .side-bar-title { font-size: 11px; font-weight: 900; color: var(--muted); text-align: center; padding-bottom: 5px; border-bottom: 1px dashed var(--border-color); margin-bottom: 2px; }
  .side-bar-title.ai-title { margin-top: 8px; color: #5D6D7E; }

  .side-link-item { display: block; text-align: center; padding: 8px 6px; border-radius: 8px; text-decoration: none; font-size: 11.5px; font-weight: 700; transition: all 0.2s ease; }
  .side-link-item:hover { transform: scale(1.03); opacity: 0.9; }

  /* تنسيقات الروابط الجانبية لليمين */
  .lnk-google { background: #F1F3F4; color: #4285F4; }
  .lnk-drive { background: #E8F0FE; color: #1967D2; }
  .lnk-gmail { background: #FCE8E6; color: #C5221F; }
  .lnk-whatsapp { background: #E6F4EA; color: #128C7E; } 
  .lnk-gpt { background: #E6F6F2; color: #10a37f; }
  .lnk-gemini { background: #E8F0FE; color: #1a73e8; }
  .lnk-claude { background: #FEF3C7; color: #d97706; }

  /* تنسيقات الروابط الجانبية لليسار */
  .lnk-qiwa { background: #E0F2F1; color: #004D40; }
  .lnk-balady { background: #E0F7FA; color: #006064; }
  .lnk-mudad { background: #E8EAF6; color: #1A237E; }
  .lnk-absher { background: #E8F5E9; color: #1B5E20; }
  .lnk-gosi { background: #FFF3E0; color: #E65100; }
  .lnk-chi { background: #E0F2F1; color: #00796B; } /* لون التأمين الصحي المخصص */

  .main-content { flex: 1; width: 100%; max-width: 1300px; margin: 0 auto; padding: 0 160px; }

  .hero-section {
    background: var(--bg-card);
    text-align: center;
    padding: 20px 20px 65px;
    border-bottom: 1px solid var(--border-color);
    border-radius: 0 0 var(--radius) var(--radius);
    box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    transition: background 0.3s, border-color 0.3s;
  }

  .brand-title { color: var(--color-brand); font-size: 44px; font-weight: 900; margin-bottom: 2px; letter-spacing: 1px; }
  .hero-section h1 { font-size: 19px; font-weight: 700; margin-bottom: 12px; color: var(--text-dark); }

  .live-clock-panel { display: inline-flex; align-items: center; justify-content: center; gap: 15px; background: #EAF2F1; padding: 8px 22px; border-radius: 30px; margin-bottom: 5px; flex-wrap: wrap; }
  [data-theme="dark"] .live-clock-panel { background: #2A3A39; }
  .live-time { font-size: 19px; font-weight: 900; color: #111; font-family: monospace, sans-serif; }
  [data-theme="dark"] .live-time { color: #fff; }
  .live-date { font-size: 13px; font-weight: 700; color: #2E7D32; border-right: 2px solid #BDC3C7; padding-right: 15px; }
  .live-hijri { font-size: 13px; font-weight: 700; color: #C0392B; border-right: 2px solid #BDC3C7; padding-right: 15px; }

  .cards-container { margin: -35px auto 30px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

  @media (max-width: 1000px) {
    .cards-container { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .main-content { padding: 0 20px; }
    .side-bar { position: relative; top: 0; transform: none; flex-direction: row; justify-content: center; width: 100%; border-radius: var(--radius) !important; margin: 15px 0; flex-wrap: wrap; }
    .side-bar-title { width: 100%; border-bottom: none; margin-bottom: 0; }
  }

  .portal-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 22px 18px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 1px solid var(--border-color); 
    text-decoration: none;
    color: var(--text-dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.2s ease, box-shadow 0.2s, background 0.3s, border-color 0.3s;
    position: relative;
    overflow: hidden;
  }
  .portal-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; }

  .card-stock::before { background: var(--color-stock); } 
  .card-stock .icon-wrapper { background: #FDEBD0; color: var(--color-stock); }
  .card-accounts::before
